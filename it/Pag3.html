<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Model | Gobetti Volta Corse</title>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="../components.js" defer></script>
</head>
<body>

    <div id="header-placeholder"></div>

<main>
    <section class="section-internal reveal-up">
        <div class="container-internal">
            
            <div class="header-internal">
                <span class="badge-crema">OUR MACHINE</span>
                <h2 class="title-internal">Il Modellino</h2>
                <div class="underline-internal"></div> 
                <p class="desc-internal">
                    Il nostro modellino F1, progettato con cura nei minimi dettagli per massimizzare velocità e aerodinamica.
                </p>
            </div>

            <!-- Card con l'immagine cliccabile -->
            <div class="card card-wide-internal reveal-up delay-1">
                <a href="#gallery-tecnica" class="card-link"> <!-- Salto verso la gallery -->
                    <div class="card-inner" style="text-align: center;">
                        <img src="../img/savethedate.png" alt="Modellino F1" class="img-model-display">
                        <p style="margin-top: 15px; font-size: 0.7rem; color: var(--accent); opacity: 0.7;">
                            (Clicca l'immagine per vedere i dettagli)
                        </p>
                    </div>
                </a>
            </div>

        </div>
    </section>

    <!-- SECTION: TECHNICAL GALLERY -->
    <section id="gallery-tecnica" class="section-internal reveal-up" style="margin-top: 50px;">
        <div class="container-internal">
            <div class="header-internal">
                <span class="badge-crema">DETAILS</span>
                <h2 class="title-internal">Technical Gallery</h2>
                <div class="underline-internal"></div>
            </div>

            <!-- Grid for 3 small photos -->
            <div class="grid-gallery-3">
              <!-- Photo 1 -->
              <div class="card card-compact reveal-up" onclick="openLightbox(0)">
                <div class="card-inner">
                  <img src="../img/dettaglio/Dettaglio01.jpg" alt="Detail 1" class="img-gallery-small">
                </div>
              </div>

              <!-- Photo 2 -->
              <div class="card card-compact reveal-up delay-1" onclick="openLightbox(1)">
                <div class="card-inner">
                  <img src="../img/dettaglio/Dettaglio02.jpg" alt="Detail 2" class="img-gallery-small">
                </div>
              </div>

              <!-- Photo 3 -->
              <div class="card card-compact reveal-up delay-2" onclick="openLightbox(2)">
                <div class="card-inner">
                  <img src="../img/dettaglio/Dettaglio03.jpg" alt="Detail 3" class="img-gallery-small">
                </div>
              </div>
            </div>
 
              <div class="grid-gallery-3">
              <!-- Photo 4 -->
              <div class="card card-compact reveal-up delay-3" onclick="openLightbox(3)">
                <div class="card-inner">
                  <img src="../img/dettaglio/Dettaglio04.jpg" alt="Detail 4" class="img-gallery-small">
                </div>
              </div>

              <!-- Photo 5 -->
              <div class="card card-compact reveal-up delay-4" onclick="openLightbox(4)">
                <div class="card-inner">
                  <img src="../img/dettaglio/Dettaglio05.jpg" alt="Detail 5" class="img-gallery-small">
                </div>
              </div>

              <!-- Photo 6 -->
              <div class="card card-compact reveal-up delay-5" onclick="openLightbox(5)">
                <div class="card-inner">
                  <img src="../img/dettaglio/Dettaglio06.jpg" alt="Detail 6" class="img-gallery-small">
                </div>
              </div>
            </div>

<!-- STRUTTURA DELLA LIGHTBOX (Invisibile all'inizio) -->
<div id="lightbox" class="lightbox-overlay">
    <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
    
    <button class="lightbox-prev" onclick="changeImg(-1)">&#10094;</button>
    
    <div class="lightbox-content">
        <img id="lightbox-img" src="" alt="Dettaglio Ingrandito">
        <div id="lightbox-caption"></div>
    </div>
    
    <button class="lightbox-next" onclick="changeImg(1)">&#10095;</button>
</div>

        </div>
    </section>
</main>
 <script>
        // 1. Definiamo l'elenco delle immagini e delle didascalie
        const galleryImages = ["img/dettaglio/Dettaglio01.jpg", "img/dettaglio/Dettaglio02.jpg", "img/dettaglio/Dettaglio03.jpg", "img/dettaglio/Dettaglio06.jpg", "img/dettaglio/Dettaglio05.jpg", "img/dettaglio/Dettaglio06.jpg"];
        const galleryCaptions = ["Dettaglio Aerodinamico Frontale", "Vasca in Fibra di Carbonio", "Sospensioni e Assetto", "Macchine in gara 1", "Macchine in gara 2", "Macchine in gara 3"];
        let currentIndex = 0;

        // 2. Funzione per aprire il pop-up
        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            document.getElementById("lightbox").style.display = "flex";
            document.body.style.overflow = "hidden"; // Blocca lo scroll del sito sotto
        }

        // 3. Funzione per chiudere il pop-up
        function closeLightbox() {
            document.getElementById("lightbox").style.display = "none";
            document.body.style.overflow = "auto"; // Riattiva lo scroll
        }

        // 4. Funzione per cambiare immagine (frecce)
        function changeImg(n) {
            currentIndex += n;
            if (currentIndex >= galleryImages.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = galleryImages.length - 1;
            updateLightbox();
        }

        // 5. Funzione che aggiorna fisicamente l'immagine mostrata
        function updateLightbox() {
            const imgElement = document.getElementById("lightbox-img");
            const captionElement = document.getElementById("lightbox-caption");
            
            imgElement.src = galleryImages[currentIndex];
            captionElement.innerText = galleryCaptions[currentIndex];
        }

        // 6. Chiudi se si clicca fuori dall'immagine (sullo sfondo scuro)
        // Usiamo un controllo per sicurezza: carichiamo questo evento solo se l'elemento esiste
        window.addEventListener('load', () => {
            const lb = document.getElementById("lightbox");
            if(lb) {
                lb.onclick = function(e) {
                    if (e.target.id === "lightbox") closeLightbox();
                };
            }
        });
    </script>
    <div id="footer-placeholder"></div>
</body>
</html>
