<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Eventi | Gobetti Volta Corse</title>
    <link rel="stylesheet" href="CSS/style.css">
    <script src="components.js" defer></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="section-internal">
            <div class="container-internal">
                
                <div class="header-internal reveal-up">
                    <span class="badge-crema">TIMELINE</span>
                    <h2 class="title-internal">Cronologia Eventi</h2>
                    <div class="underline-internal"></div>
                </div>

                <!-- EVENTO 18 APRILE: GIURIA -->
                <div id="giuria" class="card card-wide-internal reveal-up" style="margin-bottom: 60px;">
                    <div class="card-inner">
                        <span class="role-text">18 Aprile 2026</span>
                        <h2 class="bio-name">Controlli della Giuria</h2>
                        <p class="text-project">I momenti salienti delle verifiche tecniche e della presentazione del progetto alla giuria STEM Racing.</p>
                        
                        <!-- Griglia Foto: 3 immagini per riga -->
                        <div class="event-photo-grid">
                            <img src="img/eventi/gara01.jpg" alt="Controllo 1" onclick="openLightbox(0)">
                            <img src="img/eventi/gara02.jpg" alt="Controllo 2" onclick="openLightbox(1)">
                            <img src="img/eventi/gara03.jpg" alt="Controllo 3" onclick="openLightbox(2)">
                            <img src="img/eventi/gara04.jpg" alt="Controllo 4" onclick="openLightbox(3)">
                            <img src="img/eventi/gara05.jpg" alt="Controllo 5" onclick="openLightbox(4)">
                            <img src="img/eventi/gara06.jpg" alt="Controllo 6" onclick="openLightbox(5)">
                            <img src="img/eventi/gara07.jpg" alt="Controllo 7" onclick="openLightbox(6)">
                            <img src="img/eventi/gara08.jpg" alt="Controllo 8" onclick="openLightbox(7)">
                            <img src="img/eventi/gara09.jpg" alt="Controllo 9" onclick="openLightbox(8)">
                            <img src="img/eventi/gara10.jpg" alt="Controllo 10" onclick="openLightbox(9)">
                            <img src="img/eventi/gara11.jpg" alt="Controllo 11" onclick="openLightbox(10)">
                            <img src="img/eventi/gara12.jpg" alt="Controllo 12" onclick="openLightbox(11)">
                            <img src="img/eventi/gara13.jpg" alt="Controllo 13" onclick="openLightbox(12)">
                            <img src="img/eventi/gara14.jpg" alt="Controllo 14" onclick="openLightbox(13)">
                            <img src="img/eventi/gara15.jpg" alt="Controllo 15" onclick="openLightbox(14)">
                            <img src="img/eventi/gara16.jpg" alt="Controllo 16" onclick="openLightbox(15)">
                            <img src="img/eventi/gara17.jpg" alt="Controllo 17" onclick="openLightbox(16)">
                            <img src="img/eventi/gara18.jpg" alt="Controllo 18" onclick="openLightbox(17)">
                            <img src="img/eventi/gara19.jpg" alt="Controllo 19" onclick="openLightbox(18)">
                            <img src="img/eventi/gara20.jpg" alt="Controllo 20" onclick="openLightbox(19)">
                            <img src="img/eventi/gara21.jpg" alt="Controllo 21" onclick="openLightbox(20)">
                            <img src="img/eventi/gara22.jpg" alt="Controllo 22" onclick="openLightbox(21)">
                            <img src="img/eventi/gara23.jpg" alt="Controllo 23" onclick="openLightbox(22)">
                            <img src="img/eventi/gara24.jpg" alt="Controllo 24" onclick="openLightbox(23)">
                            <img src="img/eventi/gara25.jpg" alt="Controllo 25" onclick="openLightbox(24)">
                        </div>
                    </div>
                </div>

                <!-- EVENTO 19 APRILE: GARA -->
                <div id="gara" class="card card-wide-internal reveal-up" style="margin-bottom: 60px;">
                    <div class="card-inner">
                        <span class="role-text">19 Aprile 2026</span>
                        <h2 class="bio-name">Gara e Premiazioni</h2>
                        <p class="text-project">L'emozione della pista, i lanci ad aria compressa e la cerimonia finale sul podio.</p>
                        
                        <div class="event-photo-grid">
                            <img src="img/eventi/competizione01.jpg" alt="Gara 1">
                            <img src="img/eventi/competizione02.jpg" alt="Gara 2">
                            <img src="img/eventi/competizione03.jpg" alt="Gara 3">
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
</body>
</html>
